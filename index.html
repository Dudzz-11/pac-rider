<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilo.css">
    <title>Início Pac Rider</title>
</head>
<body>
    <div id="homeScreen">
        <img class="wallpaperMenu" src="assets/video/baackground-game.gif" alt="Cidade escura">
        <button class="logoBtn">
            <img src="assets/img/logo-pac-rider.png" alt="logo pac rider">
        </button>
        <h2 class="textStart">Clique na logo para iniciar!</h2>
    </div>

    <div id="login">
        <div class="loginBox">
            <div class="loginHeader">
                <img src="assets/img/logo-pac-rider.png" alt="logo pac rider" class="loginLogo">
                <p class="loginSubtitle">Entre e seja o mais rápido do MC <p>
            </div>

            <div class="tabRow">
                <button class="tabBtn active" id="tabLoginBtn">Login</button>
                <button class="tabBtn" id="tabRegisterBtn">Cadastre-se</button>
            </div>

            <div id="loginFields">
                <div class="inputField">
                    <span class="inputIcon"></span>
                    <input type="text" id="usuarioLogin" placeholder="Nome de usuário">
                </div>
                <div class="inputField">
                    <span class="inputIcon"></span>
                    <input type="password" id="passwordLogin" placeholder="Senha">
                </div>
                <button class="btn btnLogin">Entrar</button>
            </div>

            <div id="registerFields" style="display: none;">
                <div class="inputField">
                    <span class="inputIcon"></span>
                    <input type="text" id="usuarioRegister" placeholder="Escolha um nome de usuário">
                </div>
                <div class="inputField">
                    <span class="inputIcon"></span>
                    <input type="password" id="passwordRegister" placeholder="Crie uma senha">
                </div>
                <button class="btn btnRegister">Criar conta</button>
            </div>

            <div class="divider">
                <hr><span>ou</span><hr>
            </div>

            <button class="btn btnGuest">&nbsp; Jogar como convidado</button>

            <p id="message"></p>
        </div>
    </div>

    <div id="playGame">
        <div class="play">
            <img class="icon" src="assets/img/icon1-player.png" alt="ícone jogador">
            <p class="playerName" id="displayName">Jogador</p>
            <p class="playSubtitle">Pronto para andar?</p>
            <a class="btnPlay" href="game.html">Play</a>
        </div>

        <div class="rankingPlayers">
            <h2>Ranking</h2>
            <div id="rankingList">
                <p class="rankingEmpty">Nenhuma run registrada ainda.</p>
            </div>
        </div>
    </div>

    <script src="js/pages/home.js"></script>
</body>
</html>
